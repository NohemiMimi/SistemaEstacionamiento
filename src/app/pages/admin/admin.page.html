<ion-header>
  <ion-toolbar color="dark">
    <ion-title>Vista admin</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        Cerrar sesión
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="admin-bg ion-padding">

  <!-- KPIs -->
  <ion-grid>
    <ion-row>
      <ion-col>
        <ion-card class="kpi-card">
          <ion-card-content>
            <div style="text-align:center">
              <div style="font-size:14px;color:#888">Espacios Totales</div>
              <div style="font-size:28px;font-weight:bold">{{stats.totalSpaces}}</div>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col>
        <ion-card class="kpi-card">
          <ion-card-content>
            <div style="text-align:center">
              <div style="font-size:14px;color:#888">Ocupados</div>
              <div style="font-size:28px;font-weight:bold;color:#e74c3c">
                {{stats.occupiedSpaces}}
              </div>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col>
        <ion-card class="kpi-card">
          <ion-card-content>
            <div style="text-align:center">
              <div style="font-size:14px;color:#888">Disponibles</div>
              <div style="font-size:28px;font-weight:bold;color:#2ecc71">
                {{stats.availableSpaces}}
              </div>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col>
        <ion-card class="kpi-card">
          <ion-card-content>
            <div style="text-align:center">
              <div style="font-size:14px;color:#888">Ingresos del Día</div>
              <div style="font-size:28px;font-weight:bold;color:#f39c12">
                ${{stats.dailyIncome}}
              </div>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Escáner -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Escáner QR</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-button expand="block" color="primary" (click)="scanQR()">
        ESCANEAR QR
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Vehículos -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Vehículos Recientes</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <ion-button expand="block" color="tertiary" (click)="registerManualEntry()">
        REGISTRAR ENTRADA MANUAL
      </ion-button>

      <!-- LISTA -->
      <ion-list [hidden]="vehicles.length === 0">
        <div [innerHTML]="vehiclesHTML"></div>
      </ion-list>

      <!-- MENSAJE VACÍO -->
      <p 
        [hidden]="vehicles.length > 0"
        style="text-align:center;color:#888;padding:20px">
        No hay vehículos registrados
      </p>

    </ion-card-content>
  </ion-card>

</ion-content>
