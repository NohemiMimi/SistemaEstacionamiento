<ion-content class="login-bg">
  <div class="login-wrapper">
    <div class="logo-circle">E</div>
    
    <div class="card">
      <h1>Inicio de sesión</h1>
      
      <div class="form-container">
        <ion-item lines="none" class="input-item">
          <ion-input placeholder="Correo"></ion-input>
        </ion-item>
        <ion-item lines="none" class="input-item">
          <ion-input type="password" placeholder="Contraseña"></ion-input>
        </ion-item>
        
        <ion-button expand="block" class="main-btn">INICIAR SESIÓN</ion-button>
        
        <p class="register-text">
          ¿No tienes cuenta? 
          <a [routerLink]="['/register']" style="color: #27ae60; font-weight: bold; cursor: pointer; text-decoration: none;">Registrarte</a>
        </p>
      </div>
    </div>
  </div>
</ion-content>
