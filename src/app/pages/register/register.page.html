<ion-content class="login-bg">
  <div class="login-wrapper">
    <div class="logo-circle">E</div>
    
    <div class="card">
      <h1>Registro</h1>
      
      <div class="form-container">

        <ion-item lines="none" class="input-item">
          <ion-input
            placeholder="Nombre completo"
            [(ngModel)]="nombre">
          </ion-input>
        </ion-item>

        <ion-item lines="none" class="input-item">
          <ion-input
            type="email"
            placeholder="Correo electrónico"
            [(ngModel)]="correo">
          </ion-input>
        </ion-item>

        <ion-item lines="none" class="input-item">
          <ion-input
            type="password"
            placeholder="Contraseña"
            [(ngModel)]="password">
          </ion-input>
        </ion-item>

        <ion-button
          expand="block"
          class="main-btn"
          (click)="registrar()">
          REGISTRARSE
        </ion-button>
        
        <p class="register-text">
          ¿Ya tienes cuenta? 
          <a
            [routerLink]="['/login']"
            style="color: #27ae60; font-weight: bold; cursor: pointer; text-decoration: none;">
            Iniciar sesión
          </a>
        </p>

      </div>
    </div>
  </div>
</ion-content>
